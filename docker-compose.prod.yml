# Production: run pre-built images from registry (no local build).
# Set REGISTRY and IMAGE_TAG on the server or in .env.
# Logging: Promtail -> Loki; Grafana: Loki + Prometheus. Metrics: backend
# /metrics + cAdvisor. Grafana: http://<host>:3000 (default admin/admin).
version: "3.8"
services:
  backend:
    image: ${REGISTRY:-194.87.130.247:5000}/docker-fastapi-demo-backend:${IMAGE_TAG:-latest}
    container_name: demo-backend
    expose:
      - "8000"

  frontend:
    image: ${REGISTRY:-194.87.130.247:5000}/docker-fastapi-demo-frontend:${IMAGE_TAG:-latest}
    container_name: demo-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: demo-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    depends_on:
      - backend

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: demo-cadvisor
    privileged: true
    ports:
      - "8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    depends_on:
      - backend
      - frontend

  loki:
    image: grafana/loki:2.9.4
    container_name: demo-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data:/loki

  grafana:
    image: grafana/grafana:11.3.0
    container_name: demo-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - loki

  promtail:
    image: grafana/promtail:2.9.4
    container_name: demo-promtail
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

volumes:
  loki-data: {}
  grafana-data: {}
  prometheus-data: {}
