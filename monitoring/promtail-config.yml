server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.+)'
        target_label: 'container'
        replacement: '$1'
      - source_labels: ['__meta_docker_container_id']
        target_label: 'container_id'
      - source_labels: ['__meta_docker_container_id']
        regex: '(.+)'
        target_label: __path__
        replacement: /var/lib/docker/containers/$1/$1-json.log
    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
      - output:
          source: output

      - match:
          selector: '{container="demo-backend"}'
          stages:
            # - regex:
            #     expression: '^(?P<ts>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d+)\s+(?P<level>\w+):\s+(?P<msg>.+)$'
            # Текст уже без timestamp: "INFO:     172.20.0.4:... 200 OK"
            - regex:
                expression: '^(?P<level>[A-Z]+):\s+(?P<msg>.+)'
            - template:
                source: level
                template: '{{ ToLower .Value }}'
            - labels:
                level:
            # - timestamp:
            #     source: ts
            #     format: '2006-01-02 15:04:05.000'
            - output:
                source: msg

      - match:
          selector: '{container="demo-frontend"}'
          stages:
            - drop:
                expression: '^\x16\x03'
            - drop:
                expression: '^[^\d]'
            - regex:
                expression: '^(?P<remote_addr>\S+) \S+ \S+ \[(?P<ts>[^\]]+)\] "(?P<method>\S+) (?P<path>\S+) \S+" (?P<status>\d+) \d+ "[^"]*" "[^"]*"'
            - timestamp:
                source: ts
                format: '02/Jan/2006:15:04:05 -0700'
            - template:
                source: level
                template: >-
                  {{ if (lt (atoi .status) 400) }}info{{ else if (lt (atoi .status) 500) }}warn{{ else }}error{{ end }}
            - labels:
                level:
            - labels:
                method:
                status:
