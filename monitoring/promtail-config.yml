# Promtail: collect Docker container logs and push to Loki.
# Mount /var/run/docker.sock and /var/lib/docker/containers on the host.

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
        regex: '/(.+)'
        replacement: '$1'
      - source_labels: ['__meta_docker_container_id']
        target_label: 'container_id'
      - source_labels: ['__meta_docker_container_id']
        regex: '(.+)'
        target_label: __path__
        replacement: /var/lib/docker/containers/$1/$1-json.log
    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
      - output:
          source: output

      # Парсинг demo-backend
      - match:
          selector: '{container="demo-backend"}'
          stages:
            - regex:
                expression: '^(?P<ts>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d+)\s+(?Pevel>\w+):\s+(?P<msg>.+)$'
            - template:
                source: level
                template: '{{ ToLower .Value }}'
            - labels:
                level:
            - timestamp:
                source: ts
                format: '2006-01-02 15:04:05.000'
            - output:
                source: msg

      # Парсинг demo-frontend (нужно уточнить формат его логов)
      - match:
          selector: '{container="demo-frontend"}'
          stages:
            # Дропаем TLS-мусор (строки начинающиеся с бинарных байт)
            - drop:
                expression: '^\x16\x03'
            # Дропаем нечитаемые строки (не начинаются с IP-адреса)
            - drop:
                expression: '^[^\d]'  # опционально, если хочешь только валидные строки
            # 1. Парсим nginx combined log format
            - regex:
                expression: '^(?P<remote_addr>\S+) \S+ \S+ \[(?P<ts>[^\]]+)\] "(?P<method>\S+) (?P<path>\S+) \S+" (?P<status>\d+) (?P<bytes>\d+) "(?P<referer>[^"]*)" "(?P<user_agent>[^"]*)"'

            # 2. Парсим timestamp
            - timestamp:
                source: ts
                format: '02/Jan/2006:15:04:05 -0700'

            # 3. Вычисляем level из статуса и кладём в поле level
            - template:
                source: level
                template: >-
                  {{ if (lt (atoi .status) 400) }}info{{ else if (lt (atoi .status) 500) }}warn{{ else }}error{{ end }}

            # 4. Добавляем level как лейбл Loki
            - labels:
                level:

            # 5. Опционально — метод и статус тоже как лейблы
            - labels:
                method:
                status:
